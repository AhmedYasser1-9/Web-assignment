<!doctype html>
<html>
  <head>
    <title>Tasty Recipe</title>
    <link rel="stylesheet" href="Styles/main.css" />
    <link rel="stylesheet" href="Styles/signup.css" />
  </head>
  <body>
    <!-- HEADER-->
    <nav>
      <a href="home.html"
        ><img class="logo" src="Images/logo.png" alt="logo"
      /></a>
      <div class="header_links">
        <a href="#">Recipe Off The Day</a>
        <a href="#">About Us</a>
        <a href="addrecipe.html"><button>Add Recipe</button></a>
        <a href="login.html"><button>login</button></a>
        <a href="signup.html"><button>sign up</button></a>
        <a href="Myfavoriteslist.html"><button>My favorites list</button></a>
      </div>
    </nav>

    <div class="wrapper">
      <!-- Sign up form -->
      <div class="signup_form">
        <h2>Sign Up</h2>
        <form action="/signup" method="post">
          <label for="username">Username:</label>
          <input type="text" id="username" name="username" required />

          <label for="email">Email:</label>
          <input type="email" id="email" name="email" required />

          <label for="password">Password:</label>
          <input type="password" id="password" name="password" required />

          <!-- radio for choosing admin or normal user -->
          <div class="radio_buttons">
            <label>
              <input type="radio" name="user_type" value="normal" />
              Normal User
            </label>
            <label>
              <input type="radio" name="user_type" value="admin" />
              Admin
            </label>
          </div>

          <input type="submit" value="Sign Up" />
        </form>
      </div>
    </div>
  </body>
</html>
