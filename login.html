<!doctype html>
<html>
  <head>
    <title>Tasty Recipe</title>
    <link rel="stylesheet" href="Styles/main.css" />
    <link rel="stylesheet" href="Styles/login.css" />
  </head>
  <body>
    <!-- HEADER-->
   <nav>
    <a href="home.html"><img class="logo" src="Images/logo.png" alt="logo" /></a>

    <!-- Global Navigation Search Bar -->
    <div class="nav-search">
        <input id="navSearchInput" type="text" placeholder="Search recipes..." />
        <button id="navSearchBtn" type="submit">Search</button>
    </div>

    <div class="header_links">
        <a href="about.html">About Us</a>
        <a href="Recipies.html"><button>Available Recipes</button></a>
        <a href="addrecipe.html"><button>Add Recipe</button></a>
        <a href="login.html"><button>login</button></a>
        <a href="signup.html"><button>sign up</button></a>
        <a href="Myfavoriteslist.html"><button>My favorites list</button></a>
        <a href="admin.html"><button>Manage Recipes</button></a>
    </div>
</nav>
    <div class="wrapper">
      <!-- Login form -->
      <div class="login_form">
        <h2>Login</h2>
        <form action="/login" method="post">
          <label for="username">Username:</label>
          <input type="text" id="username" name="username" required />

          <label for="email">Email:</label>
          <input type="email" id="email" name="email" required />

          <label for="password">Password:</label>
          <input type="password" id="password" name="password" required />

          <input type="submit" value="Login" />

          <p>Don't have an account? <a href="signup.html">Sign up</a></p>
        </form>
      </div>
    </div>
    <script type="module" src="JS/functions.js"></script>
  </body>
</html>
